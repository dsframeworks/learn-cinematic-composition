<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="500x500w.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>42 Composition Techniques | dS FRAMEWORKS</title>
    
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        black: '#000000',
                        white: '#ffffff',
                        red: '#dc2626',
                        gray: { 100: '#f5f5f5', 200: '#e5e5e5', 800: '#262626' }
                    }
                }
            }
        }
    </script>

    <style>
        /* Base & Resets */
        body { background-color: #ffffff; color: #000000; overflow: hidden; transition: all 0.3s; }
        
        /* Custom Scrollbar for Sidebar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e5e5; }
        ::-webkit-scrollbar-thumb:hover { background: #000; }

        /* Neo-brutalist touches */
        .brutal-border { border: 1px solid #000; }
        .brutal-border-b { border-bottom: 1px solid #000; }
        .brutal-border-r { border-right: 1px solid #000; }
        .brutal-border-t { border-top: 1px solid #000; }

        /* SVG Stage Styles */
        .stage-container {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            background: #fff;
            transition: opacity 0.4s ease;
            overflow: hidden;
        }
        
        .stage-container.fade-out { opacity: 0; }
        
        svg { width: 100%; height: 100%; display: block; }
        
        /* Base SVG Element Styles */
        .svg-line { fill: none; stroke: #000; stroke-width: 0.5; stroke-linecap: round; stroke-linejoin: round; }
        .svg-line-thick { fill: none; stroke: #000; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .svg-grid { fill: none; stroke: #000; stroke-width: 0.25; opacity: 0.3; }
        .svg-accent { fill: #dc2626; }
        .svg-accent-stroke { fill: none; stroke: #dc2626; stroke-width: 1; }
        .svg-shape { fill: #000; }
        .svg-shape-light { fill: #e5e5e5; }

        /* --- ANIMATION SYSTEM --- */
        .anim-draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; transition: stroke-dashoffset 0s; }
        .anim-pulse { transform-origin: center; transform: scale(1); transition: transform 0s; }
        .anim-fade { opacity: 0; transition: opacity 0s; }
        .anim-scale-up { transform-origin: center; transform: scale(0.5); opacity: 0.5; transition: all 0s; }
        .anim-slide-x { transform: translateX(-10px); opacity: 0; transition: all 0s; }
        .anim-slide-y { transform: translateY(10px); opacity: 0; transition: all 0s; }
        .anim-rotate { transform-origin: center; transform: rotate(0deg); transition: transform 0s; }

        .is-animating .anim-draw { animation: drawLine 2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .is-animating .anim-pulse { animation: pulseHeart 1.5s ease-in-out infinite alternate; }
        .is-animating .anim-fade { animation: fadeIn 1.5s ease-out forwards; }
        .is-animating .anim-scale-up { animation: scaleUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .is-animating .anim-slide-x { animation: slideX 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .is-animating .anim-slide-y { animation: slideY 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .is-animating .anim-rotate { animation: rotateObj 3s linear infinite; }

        .is-animating .d-1 { animation-delay: 0.3s; }
        .is-animating .d-2 { animation-delay: 0.6s; }
        .is-animating .d-3 { animation-delay: 0.9s; }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes pulseHeart { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 1; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes scaleUp { to { transform: scale(1); opacity: 1; } }
        @keyframes slideX { to { transform: translateX(0); opacity: 1; } }
        @keyframes slideY { to { transform: translateY(0); opacity: 1; } }
        @keyframes rotateObj { to { transform: rotate(360deg); } }

        /* UI States */
        .tech-item { transition: all 0.2s ease; cursor: pointer; }
        .tech-item:hover { background-color: #f5f5f5; padding-left: 1rem; }
        .tech-item.active { background-color: #000; color: #fff; padding-left: 1rem; }
        .tech-item.active .tech-num { color: #dc2626; font-weight: 700; }
        
        .cat-header { cursor: pointer; transition: background 0.2s; }
        .cat-header:hover { background-color: #f5f5f5; }

        /* --- PHOTO OVERLAY SYSTEM --- */
        .stage-container.has-photo #stagePhoto { opacity: 1; }
        .stage-container.has-photo #svgWrapper { opacity: 0; }
        
        .stage-container.has-photo.is-animating #svgWrapper { opacity: 1; }
        .stage-container.has-photo.is-animating #stagePhoto { filter: brightness(0.4); }

        /* Make SVG lines white when over a photo for visibility */
        .stage-container.has-photo #svgWrapper * { transition: all 0.3s ease; }
        .stage-container.has-photo #svgWrapper .svg-line,
        .stage-container.has-photo #svgWrapper .svg-line-thick,
        .stage-container.has-photo #svgWrapper .svg-grid,
        .stage-container.has-photo #svgWrapper [stroke="#000"] {
            stroke: #ffffff !important;
            opacity: 0.8;
        }
        .stage-container.has-photo #svgWrapper .svg-shape,
        .stage-container.has-photo #svgWrapper [fill="#000"] {
            fill: #ffffff !important;
        }
        /* Make white/grey backgrounds transparent when over photo */
        .stage-container.has-photo #svgWrapper [fill="#f8f9fa"],
        .stage-container.has-photo #svgWrapper [fill="#fafafa"],
        .stage-container.has-photo #svgWrapper [fill="#e5e5e5"],
        .stage-container.has-photo #svgWrapper [fill="#fff"] {
            fill: transparent !important;
            stroke: rgba(255,255,255,0.3) !important;
            stroke-width: 0.5;
        }

        /* --- FULLSCREEN MODE --- */
        body.fullscreen-mode .sidebar-area {
            display: none !important;
        }
        body.fullscreen-mode .preview-area {
            width: 100%;
        }

        /* Responsive Layout fixes */
        @media (max-width: 1024px) {
            body { overflow-y: auto; }
            .main-layout { flex-direction: column; height: auto; }
            .sidebar-area { width: 100%; border-right: none; border-top: 1px solid #000; height: auto; max-height: none; }
            .preview-area { height: auto; padding: 1rem; min-height: 50vh; display: flex; flex-direction: column; justify-content: center; }
            .header-info { display: none; }
            body.fullscreen-mode .sidebar-area { display: none !important; }
        }
    </style>
</head>
<body class="text-black antialiased selection:bg-red selection:text-white">

    <div class="flex h-screen w-full main-layout">
        
        <!-- SIDEBAR -->
        <aside class="sidebar-area w-80 lg:w-[350px] flex flex-col brutal-border-r bg-white z-20 overflow-hidden shrink-0 h-full lg:h-screen order-2 lg:order-1 transition-all duration-300">

                    <!-- Fallback Button -->
                    <button id="btnAnimate" class="text-xs tracking-widest uppercase font-medium brutal-border px-4 py-2 hover:bg-black hover:text-white transition-colors active:bg-red active:border-red active:text-white select-none bg-white">

              img: "comp_images/img_40.jpg",
              svg: `<rect x="30" y="25" width="40" height="40" class="svg-shape anim-slide-y"/>
                    <circle cx="110" cy="45" r="20" class="svg-accent-stroke anim-slide-y d-1" stroke-dasharray="4,4"/>` },
            { id: 41, num: "41", cat: "Story & Mood", name: "Storytelling", desc: "Including visual clues that prompt the viewer to ask questions about what happened or will happen.", 
              img: "comp_images/img_41.jpg",
              svg: `<circle cx="30" cy="60" r="10" class="svg-shape anim-fade"/>
                    <path d="M50 60 Q 80 40, 110 60" class="svg-grid anim-draw d-1" stroke-dasharray="2,2"/>
                    <rect x="120" y="55" width="10" height="10" fill="#dc2626" class="anim-scale-up d-2"/>` },
            { id: 42, num: "42", cat: "Story & Mood", name: "Minimalism", desc: "Extreme reduction of elements. Only the absolute essential subject remains in a vast void.", 
              img: "comp_images/img_42.jpg",
              svg: `<circle cx="80" cy="45" r="4" class="svg-shape anim-fade d-1"/>` }
        ];

        // --- STATE & DOM ELEMENTS ---
        let currentIndex = 0;
        let isAnimating = false;
        let isPhotoVisible = false;
        let isFullscreen = false;
        let filteredData = [...techniquesData];

        const listContainer = document.getElementById('listContainer');
        const svgContainer = document.getElementById('svgContainer');
        const svgWrapper = document.getElementById('svgWrapper');
        const stagePhoto = document.getElementById('stagePhoto');
        const stageTitle = document.getElementById('stageTitle');
        const stageCategory = document.getElementById('stageCategory');
        const stageNum = document.getElementById('stageNum');
        const stageDesc = document.getElementById('stageDesc');
        const searchInput = document.getElementById('searchInput');
        
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnAnimate = document.getElementById('btnAnimate');
        const btnTogglePhoto = document.getElementById('btnTogglePhoto');
        const btnFullscreen = document.getElementById('btnFullscreen');
        const photoBtnText = document.getElementById('photoBtnText');
        
        const animStatus = document.getElementById('animStatus');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        // --- FUNCTIONS ---

        function renderSidebar() {
            listContainer.innerHTML = '';
            if (filteredData.length === 0) {
                listContainer.innerHTML = '<div class="p-4 text-sm text-gray-500">No techniques found.</div>';
                return;
            }

            // Group by category
            const grouped = filteredData.reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            for (const [category, items] of Object.entries(grouped)) {
                // Category Header
                const catDiv = document.createElement('div');
                catDiv.className = 'cat-header p-3 brutal-border-b bg-gray-50 text-xs font-bold uppercase tracking-widest sticky top-0 z-10 flex justify-between items-center';
                catDiv.innerHTML = `<span>${category}</span> <span class="text-gray-400 font-normal">${items.length}</span>`;
                listContainer.appendChild(catDiv);

                // Items
                items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    const isActive = techniquesData[currentIndex].id === item.id;
                    itemDiv.className = `tech-item flex items-baseline gap-3 p-3 brutal-border-b text-sm ${isActive ? 'active' : ''}`;
                    itemDiv.onclick = () => selectTechnique(item.id);
                    itemDiv.innerHTML = `
                        <span class="tech-num text-xs ${isActive ? '' : 'text-gray-400'} font-mono">${item.num}</span>
                        <span class="font-medium">${item.name}</span>
                    `;
                    listContainer.appendChild(itemDiv);
                });
            }
        }

        function renderStage() {
            const tech = techniquesData[currentIndex];
            
            // Fade out
            svgContainer.classList.add('fade-out');
            
            setTimeout(() => {
                // Update Content
                stageTitle.textContent = tech.name;
                stageCategory.textContent = tech.cat;
                stageNum.textContent = `#${tech.num}`;
                stageDesc.textContent = tech.desc;
                
                // Update Photo
                stagePhoto.src = tech.img;
                
                // Inject SVG
                svgWrapper.innerHTML = `
                    <svg viewBox="0 0 160 90" preserveAspectRatio="xMidYMid meet">
                        ${tech.svg}
                    </svg>
                `;
                
                // Re-apply animation state
                if (isAnimating) {
                    svgContainer.classList.add('is-animating');
                } else {
                    svgContainer.classList.remove('is-animating');
                }

                // Fade in
                svgContainer.classList.remove('fade-out');
            }, 200); // Wait for fade out CSS transition

            // Update Sidebar highlighting
            document.querySelectorAll('.tech-item').forEach(el => el.classList.remove('active'));
            renderSidebar(); 
            
            // Scroll sidebar to active item
            const activeEl = document.querySelector('.tech-item.active');
            if(activeEl) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function selectTechnique(id) {
            const index = techniquesData.findIndex(t => t.id === id);
            if (index !== -1) {
                currentIndex = index;
                renderStage();
            }
        }

        function toggleAnimation(state) {
            isAnimating = state;
            if (isAnimating) {
                svgContainer.classList.add('is-animating');
                statusText.textContent = "Animating...";
                statusDot.classList.replace('bg-black', 'bg-red');
                animStatus.classList.add('border-red', 'text-red');
                btnAnimate.classList.add('bg-black', 'text-white');
            } else {
                svgContainer.classList.remove('is-animating');
                statusText.textContent = "Static";
                statusDot.classList.replace('bg-red', 'bg-black');
                animStatus.classList.remove('border-red', 'text-red');
                btnAnimate.classList.remove('bg-black', 'text-white');
                
                // Reset CSS Reflow
                void svgContainer.offsetWidth; 
            }
        }

        function updatePhotoState() {
            if (isPhotoVisible) {
                svgContainer.classList.add('has-photo');
                btnTogglePhoto.classList.add('bg-black', 'text-white');
                photoBtnText.textContent = "Hide Photo";
            } else {
                svgContainer.classList.remove('has-photo');
                btnTogglePhoto.classList.remove('bg-black', 'text-white');
                photoBtnText.textContent = "Show Photo";
            }
        }

        // --- EVENT LISTENERS ---

        // Fullscreen Toggle logic
        btnFullscreen.addEventListener('click', () => {
            isFullscreen = !isFullscreen;
            document.body.classList.toggle('fullscreen-mode', isFullscreen);
            
            if (isFullscreen) {
                btnFullscreen.classList.add('bg-black', 'text-white');
                btnFullscreen.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    <span class="hidden sm:inline">Unfocus</span>
                `;
            } else {
                btnFullscreen.classList.remove('bg-black', 'text-white');
                btnFullscreen.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    <span class="hidden sm:inline">Focus</span>
                `;
            }

            // Force reflow for SVG resizing smoothly
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
        });

        // Photo Toggle button click handler 
        btnTogglePhoto.addEventListener('click', () => {
            isPhotoVisible = !isPhotoVisible;
            updatePhotoState();
        });

        // Navigation (Buttons)
        btnPrev.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + techniquesData.length) % techniquesData.length;
            renderStage();
        });

        btnNext.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % techniquesData.length;
            renderStage();
        });

        // Search
        searchInput.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            filteredData = techniquesData.filter(t => 
                t.name.toLowerCase().includes(q) || 
                t.cat.toLowerCase().includes(q)
            );
            renderSidebar();
        });

        // Key Listeners for SHIFT, CAPSLOCK, and ARROW KEYS
        window.addEventListener('keydown', (e) => {
            // Shift logic for animation
            if (e.key === 'Shift' && !e.repeat) {
                toggleAnimation(true);
            }
            // Arrow Keys for navigation
            if (e.key === 'ArrowRight') {
                btnNext.click();
            }
            if (e.key === 'ArrowLeft') {
                btnPrev.click();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'Shift') {
                toggleAnimation(false);
            }
            
            // Check CapsLock status whenever a key goes up (specifically for CapsLock toggling)
            if (e.key === 'CapsLock') {
                isPhotoVisible = e.getModifierState('CapsLock');
                updatePhotoState();
            }
        });

        // Fallback Button Logic (Mouse & Touch)
        btnAnimate.addEventListener('mousedown', () => toggleAnimation(true));
        btnAnimate.addEventListener('mouseup', () => toggleAnimation(false));
        btnAnimate.addEventListener('mouseleave', () => toggleAnimation(false));
        
        btnAnimate.addEventListener('touchstart', (e) => { e.preventDefault(); toggleAnimation(true); });
        btnAnimate.addEventListener('touchend', (e) => { e.preventDefault(); toggleAnimation(false); });
        btnAnimate.addEventListener('touchcancel', (e) => { e.preventDefault(); toggleAnimation(false); });

        // --- INITIALIZATION ---
        renderSidebar();
        renderStage();

    </script>
